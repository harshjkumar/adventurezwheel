version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e NEXT_PUBLIC_ -e SUPABASE_ -e R2_ -e ADMIN_ >> .env.production
    build:
      commands:
        - npm run build

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - '.next/cache/**/*'
      - '.npm/**/*'
